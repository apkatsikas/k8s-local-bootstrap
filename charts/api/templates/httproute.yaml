apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: gateway
    namespace: default
# sectionName restricts this route to the https listener only.
# Without it, the route binds to all listeners and wins over the http->https redirect on port 80.
    sectionName: https
  hostnames:
  - {{ .Values.hostname }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: api
      port: 80
